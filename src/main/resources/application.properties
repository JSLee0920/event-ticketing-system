spring.application.name=event-ticketing-system
spring.datasource.url=jdbc:postgresql://localhost:5432/event_ticket_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jwt.private.key=classpath:certs/private.pem
jwt.public.key=classpath:certs/public.pem

# Frontend origins allowed to call the API with credentials (cookies)
app.cors.allowed-origins=http://localhost:3000

# Pending orders older than this are auto-cancelled and their inventory released
app.orders.pending-expiry-minutes=15
app.orders.expiry-check-ms=60000
